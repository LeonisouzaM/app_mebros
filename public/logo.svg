<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#818CF8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="26" fill="url(#grad)" filter="url(#soft-shadow)"/>

  <!-- Inner white sparkle / star shape representing learning/membership -->
  <!-- Book icon simplified -->
  <rect x="27" y="30" width="20" height="38" rx="4" fill="white" opacity="0.95"/>
  <rect x="31" y="30" width="42" height="38" rx="4" fill="white"/>
  <!-- Spine line -->
  <rect x="49" y="30" width="2" height="38" fill="#C4B5FD" opacity="0.6"/>
  <!-- Lines on right page -->
  <rect x="55" y="40" width="12" height="2.5" rx="1.2" fill="#C4B5FD"/>
  <rect x="55" y="47" width="10" height="2.5" rx="1.2" fill="#C4B5FD"/>
  <rect x="55" y="54" width="12" height="2.5" rx="1.2" fill="#C4B5FD"/>
  <!-- Lines on left page -->
  <rect x="33" y="40" width="12" height="2.5" rx="1.2" fill="#C4B5FD"/>
  <rect x="33" y="47" width="10" height="2.5" rx="1.2" fill="#C4B5FD"/>
  <rect x="33" y="54" width="12" height="2.5" rx="1.2" fill="#C4B5FD"/>

  <!-- Small star / membership badge top right -->
  <circle cx="74" cy="26" r="10" fill="#F9FAFB" opacity="0.95"/>
  <text x="74" y="30.5" font-family="Arial" font-size="13" font-weight="bold" fill="#818CF8" text-anchor="middle">★</text>
</svg>
