<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White background -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>

  <!-- Purple book icon -->
  <!-- Left page -->
  <rect x="20" y="28" width="26" height="42" rx="4" fill="#EDE9FE"/>
  <!-- Right page -->
  <rect x="30" y="28" width="50" height="42" rx="4" fill="#7C3AED"/>
  <!-- Right page lines (white) -->
  <rect x="40" y="40" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <rect x="40" y="48" width="22" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <rect x="40" y="56" width="26" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Left page lines (purple) -->
  <rect x="24" y="40" width="14" height="3" rx="1.5" fill="#7C3AED" opacity="0.5"/>
  <rect x="24" y="48" width="12" height="3" rx="1.5" fill="#7C3AED" opacity="0.5"/>
  <rect x="24" y="56" width="14" height="3" rx="1.5" fill="#7C3AED" opacity="0.5"/>
  <!-- Spine -->
  <rect x="29" y="28" width="3" height="42" rx="1.5" fill="#5B21B6"/>

  <!-- Star badge top-right -->
  <circle cx="76" cy="30" r="12" fill="#7C3AED"/>
  <text x="76" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">★</text>
</svg>
