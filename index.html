<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Minha Área de Membros Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#A855F7',
                hover: '#9333EA',
                light: '#F3E8FF',
              },
              background: '#F8FAFC',
              surface: {
                card: '#FFFFFF',
              },
              text: {
                main: '#1E293B',
                muted: '#64748B',
                dim: '#94A3B8',
              },
              success: '#22C55E',
              warning: '#F59E0B',
              error: '#EF4444',
            },
            boxShadow: {
              premium: '0 4px 20px rgba(0, 0, 0, 0.05)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'Inter', 'sans-serif'],
            },
            animation: {
              'fade-up': 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fadeIn 0.4s ease-out forwards',
              'slide-in': 'slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 3s ease-in-out infinite',
              'shake': 'shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both',
            },
            keyframes: {
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              }
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-[#F8FAFC] text-[#1E293B] antialiased;
        }
      }

      @layer components {
        .glass-effect {
          @apply bg-white/70 backdrop-blur-xl border border-white/40 shadow-premium;
        }
        .card-modern {
          @apply bg-white rounded-[24px] shadow-premium border border-slate-100 transition-all duration-500;
        }
        .btn-primary {
          @apply bg-[#A855F7] text-white font-bold py-4 px-8 rounded-2xl hover:bg-[#9333EA] shadow-xl shadow-purple-500/20 active:scale-95 transition-all duration-300;
        }
        .input-modern {
          @apply bg-white border border-slate-200 rounded-[20px] px-6 py-4 focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500/40 outline-none transition-all duration-300;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/source/main.tsx"></script>
  </body>
</html>
